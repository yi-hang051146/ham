<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ham - 个人主页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- KaTeX 数学公式渲染 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <!-- 背景音乐播放器 -->
    <div class="music-player">
        <audio id="bgMusic"></audio>
        <button class="music-btn" id="musicToggle" title="播放/暂停音乐">
            <svg class="music-icon play-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
            </svg>
            <svg class="music-icon pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
        </button>
    </div>

    <div class="container">
        <header>
            <img src="./assets/images/avatar.jpg" alt="头像" class="avatar">
            <h1>Ham</h1>
            <p class="tagline">开发者 / 创造者 / 终身学习者</p>
            <div class="status">
                <span class="status-dot"></span>
                <span>Open to opportunities</span>
            </div>
        </header>

        <section>
            <div class="section-label">// 关于我</div>
            <p class="about-text">
                你好！我是一名热爱技术的开发者，专注于构建优雅、高效的软件解决方案。
                我相信代码不仅是工具，更是一种表达创造力的方式。
                在工作之余，我喜欢探索新技术、阅读和思考。
            </p>
        </section>

        <section id="schedule-section">
            <div class="section-label">// 课表</div>
            <div id="schedule-container" class="schedule-container">
                <!-- 动态内容由 JavaScript 渲染 -->
            </div>
        </section>

        <section>
            <div class="section-label">// 技能</div>
            <div class="skills-grid">
                <span class="skill-tag">JavaScript</span>
                <span class="skill-tag">TypeScript</span>
                <span class="skill-tag">Python</span>
                <span class="skill-tag">React</span>
                <span class="skill-tag">Vue.js</span>
                <span class="skill-tag">Node.js</span>
                <span class="skill-tag">Git</span>
                <span class="skill-tag">Docker</span>
            </div>
        </section>

        <section>
            <div class="section-label">// 关注内容</div>
            <div class="interests-grid" id="interests-grid">
                <!-- 动态加载关注内容卡片 -->
            </div>
        </section>

        <!-- 模态框 -->
        <div class="modal-overlay" id="modal-overlay">
            <div class="modal-container">
                <div class="modal-header">
                    <div class="modal-title">
                        <span class="modal-icon" id="modal-icon"></span>
                        <h2 id="modal-title-text"></h2>
                    </div>
                    <button class="modal-close" id="modal-close">×</button>
                </div>
                <div class="modal-body" id="modal-body">
                    <!-- 动态加载内容 -->
                </div>
            </div>
        </div>

        <section>
            <div class="section-label">// 联系我</div>
            <div class="links-grid">
                <a href="https://github.com/yi-hang051146" class="link-btn" target="_blank">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    GitHub
                </a>
                <div class="link-btn secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    yihangwhu@petalmail.com
                </div>
            </div>
        </section>

        <footer>
            <p>© 2024 Ham. All rights reserved.</p>
        </footer>
    </div>

    <!-- KaTeX 数学公式渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <!-- Highlight.js 代码高亮 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/schedule.js"></script>
    <script src="./js/siyuan-renderer.js"></script>
    <script src="./js/interests.js"></script>
</body>
</html>
